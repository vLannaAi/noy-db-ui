name: Release

# Manually triggered: publishes any package whose version in package.json is not
# yet on npm (changeset publish is idempotent). Run from the Actions tab → Release
# → "Run workflow", or `gh workflow run release.yml --ref main`.
on:
  workflow_dispatch:

concurrency: release

permissions:
  contents: write # push the git tags `changeset publish` creates

jobs:
  release:
    name: Publish to npm (@latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `changeset publish` can create/push release tags
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Publish
        run: pnpm release # = pnpm build && changeset publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Push release tags
        run: git push origin --tags
