name: Release

# Manually triggered: publishes any package whose version in package.json is not
# yet on npm (changeset publish is idempotent). Run from the Actions tab → Release
# → "Run workflow", or `gh workflow run release.yml --ref main`.
on:
  workflow_dispatch:

concurrency: release

permissions:
  contents: write # push the git tags `changeset publish` creates

jobs:
  release:
    name: Publish to npm (@latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags so `changeset publish` can create/push release tags
      - name: Enable corepack (pnpm)
        run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Configure git identity
        # changesets creates ANNOTATED tags (`git tag -m`), which fail with exit 128 on a
        # runner with no committer identity — and changesets discards the exit code after
        # logging "New tag", so the failure is silent and the tag push finds nothing.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Publish
        run: pnpm release # = pnpm build && changeset publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Push release tags
        # `changeset tag` is idempotent (skips tags that exist locally or on the remote),
        # so this also back-fills tags for any release where tagging failed.
        run: |
          pnpm exec changeset tag
          git push origin --tags
